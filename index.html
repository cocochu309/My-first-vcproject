<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>萌趣学汉字 - 儿童汉字学习工具</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Ma+Shan+Zheng&family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #FF6B6B;
            --secondary: #4ECDC4;
            --accent: #FFE66D;
            --bg: #FFF9E6;
            --text: #2C3E50;
            --card-bg: #FFFFFF;
            --success: #95E1D3;
            --warm: #F38181;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Noto Sans SC', sans-serif;
            background: var(--bg);
            min-height: 100vh;
            overflow-x: hidden;
            background-image: 
                radial-gradient(circle at 20% 80%, rgba(78, 205, 196, 0.1) 0%, transparent 50%),
                radial-gradient(circle at 80% 20%, rgba(255, 107, 107, 0.1) 0%, transparent 50%),
                radial-gradient(circle at 50% 50%, rgba(255, 230, 109, 0.05) 0%, transparent 70%);
        }

        .app-container {
            max-width: 800px;
            margin: 0 auto;
            padding: 16px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        header {
            text-align: center;
            padding: 16px 0;
            position: relative;
        }

        h1 {
            font-family: 'Ma Shan Zheng', cursive;
            font-size: 2.5rem;
            color: var(--primary);
            text-shadow: 2px 2px 0 var(--accent);
            margin-bottom: 8px;
        }

        .progress-bar {
            background: rgba(255, 255, 255, 0.8);
            border-radius: 20px;
            padding: 8px 16px;
            display: inline-flex;
            align-items: center;
            gap: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        .progress-text {
            font-size: 14px;
            color: var(--text);
            font-weight: 500;
        }

        .progress-track {
            width: 120px;
            height: 10px;
            background: #eee;
            border-radius: 5px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--secondary), var(--success));
            border-radius: 5px;
            transition: width 0.5s ease;
        }

        .group-nav {
            display: flex;
            gap: 8px;
            overflow-x: auto;
            padding: 12px 8px;
            margin-bottom: 16px;
            scrollbar-width: none;
            -ms-overflow-style: none;
        }

        .group-nav::-webkit-scrollbar {
            display: none;
        }

        .group-btn {
            flex-shrink: 0;
            padding: 8px 16px;
            border: none;
            border-radius: 20px;
            background: white;
            color: var(--text);
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }

        .group-btn:hover {
            transform: scale(1.05);
        }

        .group-btn.active {
            background: var(--primary);
            color: white;
            box-shadow: 0 4px 15px rgba(255, 107, 107, 0.4);
        }

        .group-btn.learned {
            background: var(--secondary);
            color: white;
        }

        .main-card {
            flex: 1;
            background: var(--card-bg);
            border-radius: 24px;
            padding: 24px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
            overflow: hidden;
        }

        .card-decoration {
            position: absolute;
            top: -50px;
            right: -50px;
            width: 200px;
            height: 200px;
            background: radial-gradient(circle, rgba(255, 230, 109, 0.3) 0%, transparent 70%);
            border-radius: 50%;
        }

        .card-decoration-2 {
            position: absolute;
            bottom: -30px;
            left: -30px;
            width: 150px;
            height: 150px;
            background: radial-gradient(circle, rgba(78, 205, 196, 0.2) 0%, transparent 70%);
            border-radius: 50%;
        }

        .char-display {
            position: relative;
            width: 280px;
            height: 280px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 20px;
        }

        .char-svg {
            width: 100%;
            height: 100%;
        }

        .char-text {
            font-family: 'Ma Shan Zheng', cursive;
            font-size: 160px;
            color: var(--text);
            position: absolute;
            opacity: 0.15;
            user-select: none;
        }

        .stroke-anim {
            fill: none;
            stroke: var(--primary);
            stroke-width: 8;
            stroke-linecap: round;
            stroke-linejoin: round;
            stroke-dasharray: 1000;
            stroke-dashoffset: 1000;
            animation: drawStroke 1.5s ease forwards;
        }

        @keyframes drawStroke {
            to {
                stroke-dashoffset: 0;
            }
        }

        .pinyin {
            font-size: 28px;
            color: var(--secondary);
            font-weight: 500;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .sound-btn {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: var(--accent);
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            transition: transform 0.2s;
        }

        .sound-btn:hover {
            transform: scale(1.1);
        }

        .tabs {
            display: flex;
            gap: 8px;
            margin-bottom: 20px;
        }

        .tab-btn {
            padding: 10px 20px;
            border: none;
            border-radius: 20px;
            background: #f0f0f0;
            color: var(--text);
            font-size: 15px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .tab-btn.active {
            background: var(--secondary);
            color: white;
            box-shadow: 0 4px 15px rgba(78, 205, 196, 0.4);
        }

        .tab-content {
            width: 100%;
            min-height: 120px;
            background: #f8f9fa;
            border-radius: 16px;
            padding: 20px;
            text-align: center;
        }

        .tab-panel {
            display: none;
        }

        .tab-panel.active {
            display: block;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .words-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            justify-content: center;
        }

        .word-tag {
            padding: 8px 16px;
            background: white;
            border-radius: 20px;
            font-size: 18px;
            color: var(--text);
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
            transition: transform 0.2s;
        }

        .word-tag:hover {
            transform: scale(1.05);
            background: var(--accent);
        }

        .sentence {
            font-size: 20px;
            line-height: 1.8;
            color: var(--text);
        }

        .sentence::before {
            content: '"';
            font-size: 28px;
            color: var(--primary);
        }

        .sentence::after {
            content: '"';
            font-size: 28px;
            color: var(--primary);
        }

        .navigation {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 24px;
            margin-top: 20px;
        }

        .nav-btn {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            border: none;
            background: white;
            color: var(--text);
            font-size: 24px;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .nav-btn:hover:not(:disabled) {
            background: var(--primary);
            color: white;
            transform: scale(1.1);
        }

        .nav-btn:disabled {
            opacity: 0.3;
            cursor: not-allowed;
        }

        .page-indicator {
            font-size: 16px;
            color: var(--text);
            font-weight: 500;
            min-width: 60px;
            text-align: center;
        }

        .controls {
            display: flex;
            gap: 16px;
            margin-top: 24px;
        }

        .master-btn {
            padding: 16px 40px;
            border: none;
            border-radius: 30px;
            background: linear-gradient(135deg, var(--secondary), var(--success));
            color: white;
            font-size: 18px;
            font-weight: 700;
            cursor: pointer;
            box-shadow: 0 6px 20px rgba(78, 205, 196, 0.4);
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .master-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 30px rgba(78, 205, 196, 0.5);
        }

        .master-btn.learned {
            background: linear-gradient(135deg, #ccc, #999);
        }

        .replay-btn {
            padding: 16px 24px;
            border: 2px solid var(--accent);
            border-radius: 30px;
            background: white;
            color: var(--text);
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .replay-btn:hover {
            background: var(--accent);
            transform: translateY(-3px);
        }

        .celebration-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1000;
            display: none;
        }

        .celebration-overlay.active {
            display: block;
        }

        .celebration-text {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-family: 'Ma Shan Zheng', cursive;
            font-size: 80px;
            color: var(--primary);
            text-shadow: 3px 3px 0 var(--accent), 6px 6px 0 rgba(0,0,0,0.1);
            animation: celebrateText 2s ease forwards;
            white-space: nowrap;
        }

        @keyframes celebrateText {
            0% {
                opacity: 0;
                transform: translate(-50%, -50%) scale(0.5);
            }
            30% {
                opacity: 1;
                transform: translate(-50%, -50%) scale(1.2);
            }
            70% {
                opacity: 1;
                transform: translate(-50%, -50%) scale(1);
            }
            100% {
                opacity: 0;
                transform: translate(-50%, -50%) scale(1.5);
            }
        }

        .firework {
            position: absolute;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            animation: firework 1.5s ease-out forwards;
        }

        @keyframes firework {
            0% {
                transform: translate(0, 0) scale(1);
                opacity: 1;
            }
            100% {
                transform: translate(var(--tx), var(--ty)) scale(0);
                opacity: 0;
            }
        }

        .star {
            position: absolute;
            font-size: 24px;
            animation: starFly 1.5s ease-out forwards;
        }

        @keyframes starFly {
            0% {
                transform: translate(0, 0) scale(1) rotate(0deg);
                opacity: 1;
            }
            100% {
                transform: translate(var(--sx), var(--sy)) scale(0) rotate(360deg);
                opacity: 0;
            }
        }

        .hearts-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 999;
        }

        .heart {
            position: absolute;
            font-size: 30px;
            animation: heartFloat 2s ease-out forwards;
        }

        @keyframes heartFloat {
            0% {
                transform: translateY(0) scale(1);
                opacity: 1;
            }
            100% {
                transform: translateY(-200px) scale(0.5);
                opacity: 0;
            }
        }

        .confetti {
            position: absolute;
            width: 10px;
            height: 10px;
            animation: confettiFall 3s ease-out forwards;
        }

        @keyframes confettiFall {
            0% {
                transform: translateY(-10px) rotate(0deg);
                opacity: 1;
            }
            100% {
                transform: translateY(100vh) rotate(720deg);
                opacity: 0;
            }
        }

        footer {
            text-align: center;
            padding: 16px;
            color: #999;
            font-size: 12px;
        }

        @media (max-width: 600px) {
            h1 {
                font-size: 2rem;
            }
            
            .char-display {
                width: 220px;
                height: 220px;
            }
            
            .char-text {
                font-size: 120px;
            }
            
            .pinyin {
                font-size: 22px;
            }
            
            .tab-content {
                padding: 16px;
            }
            
            .word-tag {
                padding: 6px 12px;
                font-size: 16px;
            }
            
            .sentence {
                font-size: 18px;
            }
            
            .celebration-text {
                font-size: 48px;
            }
        }
    </style>
</head>
<body>
    <div class="app-container">
        <header>
            <h1>萌趣学汉字</h1>
            <div class="progress-bar">
                <span class="progress-text">掌握进度: <span id="mastered-count">0</span>/2000</span>
                <div class="progress-track">
                    <div class="progress-fill" id="progress-fill" style="width: 0%"></div>
                </div>
                <span class="progress-text" id="progress-percent">0%</span>
            </div>
        </header>

        <nav class="group-nav" id="group-nav"></nav>

        <main class="main-card">
            <div class="card-decoration"></div>
            <div class="card-decoration-2"></div>
            
            <div class="char-display" id="char-display">
                <svg class="char-svg" id="char-svg" viewBox="0 0 200 200"></svg>
                <div class="char-text" id="char-text"></div>
            </div>

            <div class="pinyin">
                <span id="pinyin-text"></span>
                <button class="sound-btn" id="sound-btn" title="播放读音">🔊</button>
            </div>

            <div class="tabs">
                <button class="tab-btn active" data-tab="words">组词</button>
                <button class="tab-btn" data-tab="sentence">造句</button>
            </div>

            <div class="tab-content">
                <div class="tab-panel active" id="tab-words">
                    <div class="words-grid" id="words-grid"></div>
                </div>
                <div class="tab-panel" id="tab-sentence">
                    <p class="sentence" id="sentence-text"></p>
                </div>
            </div>

            <div class="navigation">
                <button class="nav-btn" id="prev-btn" disabled>◀</button>
                <span class="page-indicator" id="page-indicator">1/20</span>
                <button class="nav-btn" id="next-btn">▶</button>
            </div>

            <div class="controls">
                <button class="master-btn" id="master-btn">
                    <span>✅</span> 掌握啦
                </button>
                <button class="replay-btn" id="replay-btn">
                    🔄 重播笔画
                </button>
            </div>
        </main>

        <footer>
            萌趣学汉字 · 适合5-6岁儿童
        </footer>
    </div>

    <div class="celebration-overlay" id="celebration-overlay">
        <div class="celebration-text">🎉 你真棒！🎉</div>
    </div>
    <div class="hearts-container" id="hearts-container"></div>

    <script src="hanzi-data.js"></script>
    <script src="stroke-data.js"></script>
    <script>
        // strokeData is loaded from stroke-data.js

        class HanziApp {
            constructor() {
                this.currentGroup = 1;
                this.currentIndex = 0;
                this.currentTab = 'words';
                this.mastered = this.loadMastered();
                
                this.init();
            }

            loadMastered() {
                try {
                    const data = localStorage.getItem('hanzi_mastered');
                    return data ? JSON.parse(data) : {};
                } catch {
                    return {};
                }
            }

            saveMastered() {
                try {
                    localStorage.setItem('hanzi_mastered', JSON.stringify(this.mastered));
                } catch {}
            }

            init() {
                this.renderGroupNav();
                this.bindEvents();
                this.loadHanzi();
                this.updateProgress();
            }

            renderGroupNav() {
                const nav = document.getElementById('group-nav');
                nav.innerHTML = '';
                
                for (let i = 1; i <= 100; i++) {
                    const btn = document.createElement('button');
                    btn.className = 'group-btn' + (i === this.currentGroup ? ' active' : '');
                    
                    const groupLearned = this.getGroupLearnedCount(i);
                    if (groupLearned === 20) {
                        btn.classList.add('learned');
                    }
                    
                    btn.textContent = `第${this.toChineseNum(i)}组`;
                    btn.dataset.group = i;
                    nav.appendChild(btn);
                }
            }

            toChineseNum(num) {
                const nums = ['一','二','三','四','五','六','七','八','九','十'];
                if (num <= 10) return nums[num-1];
                if (num <= 20) return '十' + nums[num-11];
                if (num <= 100) return Math.floor(num/10) + '十' + (num%10 ? nums[num%10-1] : '');
                return num.toString();
            }

            getGroupLearnedCount(groupId) {
                const key = `g${groupId}`;
                return this.mastered[key] ? this.mastered[key].length : 0;
            }

            bindEvents() {
                document.getElementById('group-nav').addEventListener('click', (e) => {
                    if (e.target.classList.contains('group-btn')) {
                        this.currentGroup = parseInt(e.target.dataset.group);
                        this.currentIndex = 0;
                        this.renderGroupNav();
                        this.loadHanzi();
                    }
                });

                document.getElementById('prev-btn').addEventListener('click', () => this.prev());
                document.getElementById('next-btn').addEventListener('click', () => this.next());
                
                document.querySelectorAll('.tab-btn').forEach(btn => {
                    btn.addEventListener('click', () => this.switchTab(btn.dataset.tab));
                });

                document.getElementById('master-btn').addEventListener('click', () => this.markMastered());
                document.getElementById('replay-btn').addEventListener('click', () => this.playStrokeAnimation());
                document.getElementById('sound-btn').addEventListener('click', () => this.playSound());

                document.addEventListener('keydown', (e) => {
                    if (e.key === 'ArrowLeft') this.prev();
                    if (e.key === 'ArrowRight') this.next();
                });
            }

            loadHanzi() {
                console.log('Loading group:', this.currentGroup, 'index:', this.currentIndex);
                const data = hanziData[this.currentGroup.toString()];
                console.log('Data for group:', data);
                if (!data || !data[this.currentIndex]) {
                    console.error('No data found for group:', this.currentGroup, 'index:', this.currentIndex);
                    return;
                }

                const hanzi = data[this.currentIndex];
                console.log('Hanzi data:', hanzi);
                
                document.getElementById('char-text').textContent = hanzi.char;
                document.getElementById('pinyin-text').textContent = hanzi.pinyin;

                const wordsGrid = document.getElementById('words-grid');
                wordsGrid.innerHTML = hanzi.words.map(w => `<span class="word-tag">${w}</span>`).join('');

                document.getElementById('sentence-text').textContent = hanzi.sentence;

                document.getElementById('page-indicator').textContent = 
                    `${this.currentIndex + 1}/20`;

                document.getElementById('prev-btn').disabled = this.currentIndex === 0;
                document.getElementById('next-btn').disabled = this.currentIndex === 19;

                const key = `g${this.currentGroup}`;
                const isMastered = this.mastered[key] && this.mastered[key].includes(this.currentIndex);
                const masterBtn = document.getElementById('master-btn');
                if (isMastered) {
                    masterBtn.classList.add('learned');
                    masterBtn.innerHTML = '<span>⭐</span> 已掌握';
                } else {
                    masterBtn.classList.remove('learned');
                    masterBtn.innerHTML = '<span>✅</span> 掌握啦';
                }

                this.playStrokeAnimation();
            }

            playStrokeAnimation() {
                const data = hanziData[this.currentGroup.toString()];
                if (!data || !data[this.currentIndex]) return;
                
                const hanzi = data[this.currentIndex];
                const char = hanzi.char;
                const svg = document.getElementById('char-svg');
                svg.innerHTML = '';

                const strokes = strokeData[char];
                if (strokes && strokes.length > 0) {
                    strokes.forEach((stroke, i) => {
                        const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
                        path.setAttribute('d', stroke[0]);
                        path.setAttribute('class', 'stroke-anim');
                        path.style.animationDelay = `${i * 0.3}s`;
                        svg.appendChild(path);
                    });
                } else {
                    const text = document.createElementNS('http://www.w3.org/2000/svg', 'text');
                    text.setAttribute('x', '100');
                    text.setAttribute('y', '150');
                    text.setAttribute('text-anchor', 'middle');
                    text.setAttribute('font-size', '120');
                    text.setAttribute('fill', 'var(--primary)');
                    text.textContent = char;
                    svg.appendChild(text);
                }
            }

            switchTab(tab) {
                this.currentTab = tab;
                document.querySelectorAll('.tab-btn').forEach(btn => {
                    btn.classList.toggle('active', btn.dataset.tab === tab);
                });
                document.querySelectorAll('.tab-panel').forEach(panel => {
                    panel.classList.toggle('active', panel.id === `tab-${tab}`);
                });
            }

            prev() {
                if (this.currentIndex > 0) {
                    this.currentIndex--;
                    this.loadHanzi();
                }
            }

            next() {
                if (this.currentIndex < 19) {
                    this.currentIndex++;
                    this.loadHanzi();
                }
            }

            markMastered() {
                const key = `g${this.currentGroup}`;
                if (!this.mastered[key]) {
                    this.mastered[key] = [];
                }
                
                const idx = this.mastered[key].indexOf(this.currentIndex);
                if (idx === -1) {
                    this.mastered[key].push(this.currentIndex);
                    this.showCelebration();
                } else {
                    this.mastered[key].splice(idx, 1);
                }
                
                this.saveMastered();
                this.updateProgress();
                this.loadHanzi();
                this.renderGroupNav();
            }

            showCelebration() {
                const overlay = document.getElementById('celebration-overlay');
                overlay.classList.add('active');
                
                this.createFireworks();
                this.createHearts();
                this.createConfetti();

                setTimeout(() => {
                    overlay.classList.remove('active');
                }, 2500);
            }

            createFireworks() {
                const colors = ['#FF6B6B', '#4ECDC4', '#FFE66D', '#95E1D3', '#F38181'];
                const centerX = window.innerWidth / 2;
                const centerY = window.innerHeight / 2;

                for (let i = 0; i < 30; i++) {
                    const firework = document.createElement('div');
                    firework.className = 'firework';
                    firework.style.left = centerX + 'px';
                    firework.style.top = centerY + 'px';
                    firework.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
                    
                    const angle = (Math.PI * 2 * i) / 30;
                    const distance = 100 + Math.random() * 150;
                    firework.style.setProperty('--tx', Math.cos(angle) * distance + 'px');
                    firework.style.setProperty('--ty', Math.sin(angle) * distance + 'px');
                    
                    document.getElementById('celebration-overlay').appendChild(firework);
                    
                    setTimeout(() => firework.remove(), 1500);
                }
            }

            createHearts() {
                const container = document.getElementById('hearts-container');
                const hearts = ['❤️', '💖', '💗', '💕', '💞', '💓'];
                
                for (let i = 0; i < 20; i++) {
                    setTimeout(() => {
                        const heart = document.createElement('div');
                        heart.className = 'heart';
                        heart.textContent = hearts[Math.floor(Math.random() * hearts.length)];
                        heart.style.left = (20 + Math.random() * 60) + '%';
                        heart.style.top = (40 + Math.random() * 30) + '%';
                        container.appendChild(heart);
                        
                        setTimeout(() => heart.remove(), 2000);
                    }, i * 100);
                }
            }

            createConfetti() {
                const colors = ['#FF6B6B', '#4ECDC4', '#FFE66D', '#95E1D3', '#F38181', '#AA96DA'];
                
                for (let i = 0; i < 50; i++) {
                    const confetti = document.createElement('div');
                    confetti.className = 'confetti';
                    confetti.style.left = Math.random() * 100 + '%';
                    confetti.style.top = '-10px';
                    confetti.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
                    confetti.style.animationDuration = (2 + Math.random() * 2) + 's';
                    confetti.style.animationDelay = (Math.random() * 1) + 's';
                    
                    document.body.appendChild(confetti);
                    
                    setTimeout(() => confetti.remove(), 4000);
                }
            }

            playSound() {
                const pinyin = document.getElementById('pinyin-text').textContent;
                console.log('Playing sound for:', pinyin);
                if ('speechSynthesis' in window) {
                    speechSynthesis.cancel();
                    const utterance = new SpeechSynthesisUtterance(pinyin);
                    utterance.lang = 'zh-CN';
                    utterance.rate = 0.6;
                    utterance.onerror = function(e) {
                        console.error('Speech error:', e);
                    };
                    speechSynthesis.speak(utterance);
                } else {
                    alert('您的浏览器不支持语音播放功能');
                }
            }

            updateProgress() {
                let total = 0;
                Object.values(this.mastered).forEach(arr => {
                    total += arr.length;
                });
                
                document.getElementById('mastered-count').textContent = total;
                const percent = Math.round((total / 2000) * 100);
                document.getElementById('progress-fill').style.width = percent + '%';
                document.getElementById('progress-percent').textContent = percent + '%';
            }
        }

        document.addEventListener('DOMContentLoaded', () => {
            new HanziApp();
        });
    </script>
</body>
</html>
